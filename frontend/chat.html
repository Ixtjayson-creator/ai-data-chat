<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataMind | Professional Insight Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #FAF9F6; /* Soft Alabaster */
            --bg-sidebar: #F2F0E9; /* Warm Beige */
            --bg-card: #FFFFFF;
            --primary: #4A4A3C; /* Muted Charcoal-Olive */
            --primary-light: #8B8B7A;
            --accent: #D4C5B3; /* Desert Sand */
            --text-main: #2C2C26;
            --text-muted: #6B7280;
            --border: rgba(0, 0, 0, 0.08);
            --user-bubble: #4A4A3C;
            --ai-bubble: #FFFFFF;
            --radius: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar - Professional & Solid */
        aside {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            z-index: 10;
        }

        .brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
            letter-spacing: -0.02em;
        }

        .upload-zone {
            background: var(--bg-card);
            border: 2px dashed var(--accent);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2rem;
        }

        .upload-zone:hover {
            border-color: var(--primary-light);
            background: #fffcf8;
        }

        .upload-zone svg {
            color: var(--primary-light);
            margin-bottom: 10px;
        }

        .upload-zone p {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--primary);
        }

        .session-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .file-status {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-item {
            padding: 0.75rem;
            background: var(--bg-card);
            border-radius: 10px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        /* Main View */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-page);
            position: relative;
        }

        header {
            padding: 1.5rem 3rem;
            background-color: rgba(250, 249, 246, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
        }

        /* Chat Area */
        #chat-window {
            flex: 1;
            padding: 2rem 15% 4rem 15%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            scroll-behavior: smooth;
        }

        .msg-row {
            display: flex;
            width: 100%;
        }

        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai { justify-content: flex-start; }

        .bubble {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: var(--radius);
            font-size: 0.95rem;
            line-height: 1.6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .user .bubble {
            background-color: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .bubble {
            background-color: var(--ai-bubble);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Input Area - Clean & Suspended */
        .input-box {
            padding: 2rem 15%;
            background: linear-gradient(to top, var(--bg-page) 70%, transparent);
        }

        .input-inner {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: border-color 0.2s;
        }

        .input-inner:focus-within {
            border-color: var(--primary-light);
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.8rem 1.2rem;
            outline: none;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        .send-btn:hover {
            background: var(--primary-light);
            transform: scale(1.02);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e0ddd5; border-radius: 10px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body>

    <aside>
        <div class="brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            DataMind
        </div>

        <div class="upload-zone" onclick="document.getElementById('file-upload').click()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <p>Upload Dataset</p>
            <span style="font-size: 0.7rem; color: var(--text-muted);">PDF, CSV, or EXCEL</span>
            <input type="file" id="file-upload" style="display: none;">
        </div>

        <div class="session-label">Current Workspace</div>
        <div class="file-status" id="active-file-list">
            <!-- Uploaded file will appear here -->
        </div>

        <div style="margin-top: auto; padding-top: 1.5rem; border-top: 1px solid var(--border);">
            <div class="connection-status">
                <div class="dot"></div>
                Ollama: Qwen-2.5 0.5B
            </div>
        </div>
    </aside>

    <main>
        <header>
            <div>
                <h2 id="current-filename">Analytical Workbench</h2>
                <p style="font-size: 0.75rem; color: var(--text-muted);">Ready for cross-document queries</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button style="border: 1px solid var(--border); background: white; padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: 500;">Clear Session</button>
            </div>
        </header>

        <div id="chat-window">
            <div class="msg-row ai">
                <div class="bubble">
                    Welcome to the **Analytical Workbench**. Please upload a document in the sidebar to begin our analysis.
                </div>
            </div>
        </div>

        <div class="input-box">
            <div class="input-inner">
                <input type="text" id="user-query" placeholder="Inquire about the indexed data..." autocomplete="off">
                <button class="send-btn" id="send-trigger">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const fileInput = document.getElementById('file-upload');
        const queryInput = document.getElementById('user-query');
        const sendBtn = document.getElementById('send-trigger');
        const activeFileList = document.getElementById('active-file-list');
        const headerFilename = document.getElementById('current-filename');
        
        // This array retains the message thread so the AI remembers past questions
        let chatHistory = [];

        function appendMessage(text, role) {
            const row = document.createElement('div');
            row.className = `msg-row ${role}`;
            
            // Handle markdown-like bold text (simple replace)
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            row.innerHTML = `<div class="bubble">${formattedText}</div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        fileInput.onchange = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            appendMessage(`Indexing **${file.name}**... Pulse check in progress.`, 'ai');
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('http://localhost:8000/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    headerFilename.innerText = file.name;
                    activeFileList.innerHTML = `
                        <div class="file-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            ${file.name}
                        </div>
                    `;
                    appendMessage(`✅ **${file.name}** processed successfully. You may now perform queries.`, 'ai');
                } else {
                    appendMessage(`❌ Processing failed: ${data.detail}`, 'ai');
                }
            } catch (err) {
                appendMessage("❌ Critical system error during upload.", 'ai');
            }
        };

        async function performQuery() {
            const question = queryInput.value.trim();
            if (!question) return;

            appendMessage(question, 'user');
            queryInput.value = '';

            // Add thinking state
            const thinkingRow = document.createElement('div');
            thinkingRow.className = 'msg-row ai';
            thinkingRow.innerHTML = '<div class="bubble" style="color: var(--text-muted)">Querying vector store...</div>';
            chatWindow.appendChild(thinkingRow);

            try {
                const res = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        question: question,
                        history: chatHistory 
                    })
                });
                const data = await res.json();
                chatWindow.removeChild(thinkingRow);
                
                const answerObj = data.answer || "No insights found for this query.";
                appendMessage(answerObj, 'ai');
                
                // Add the interaction to our stateful history array
                chatHistory.push({ role: "user", content: question });
                chatHistory.push({ role: "assistant", content: answerObj });
                
            } catch (err) {
                chatWindow.removeChild(thinkingRow);
                appendMessage("❌ Execution interrupted. Connection to LLM lost.", 'ai');
            }
        }

        // Added clear session feature
        document.querySelector('header button').onclick = () => {
             chatHistory = [];
             chatWindow.innerHTML = `
                <div class="msg-row ai">
                    <div class="bubble">
                        Session cleared. The chat memory has been reset.
                    </div>
                </div>
             `;
        };

        sendBtn.onclick = performQuery;
        queryInput.onkeypress = (e) => { if (e.key === 'Enter') performQuery(); };
    </script>
</body>
</html>
