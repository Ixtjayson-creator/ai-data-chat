<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataMind AI | Edge Intelligence</title>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Loaders -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0F172A;
            --primary-accent: #3B82F6;
            --bg-main: #F8FAFC;
            --bg-sidebar: #FFFFFF;
            --sidebar-width: 320px;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        aside { width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem; z-index: 20; }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.25rem; color: var(--primary); margin-bottom: 2rem; }
        .brand-icon { width: 32px; height: 32px; background: var(--primary-accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }

        .upload-card { background: #F1F5F9; border: 2px dashed #CBD5E1; border-radius: var(--radius-md); padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-card:hover { border-color: var(--primary-accent); background: #EFF6FF; }
        
        .file-list { margin-top: 1rem; display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }
        .file-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: white; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; }

        .progress-bar { width: 100%; height: 4px; background: #E2E8F0; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
        .progress-fill { height: 100%; background: var(--primary-accent); width: 0%; transition: width 0.3s; }

        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { height: 60px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; }
        
        .status-badge { display: flex; align-items: center; gap: 8px; background: #F1F5F9; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #94A3B8; }
        .status-dot.active { background: #10B981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2); }

        #chat-container { flex: 1; overflow-y: auto; padding: 2rem 15%; display: flex; flex-direction: column; gap: 1.5rem; }
        .message { display: flex; gap: 1rem; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .user-avatar { background: var(--primary); color: white; }
        .ai-avatar { background: var(--primary-accent); color: white; }
        .content { flex: 1; font-size: 0.95rem; line-height: 1.6; }
        .content pre { background: #1E293B; padding: 1rem; border-radius: 8px; margin: 1rem 0; overflow-x: auto; color: white; }

        .input-wrapper { padding: 1.5rem 15% 2.5rem 15%; }
        .input-container { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 8px; display: flex; align-items: center; box-shadow: var(--shadow-sm); }
        textarea { flex: 1; border: none; outline: none; padding: 8px 12px; font-size: 0.95rem; resize: none; max-height: 150px; }
        .send-btn { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn:disabled { background: #E2E8F0; cursor: not-allowed; }

        .thinking { display: flex; gap: 4px; padding: 8px; }
        .dot { width: 4px; height: 4px; background: #94A3B8; border-radius: 50%; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-4px); } }
    </style>
</head>
<body>

    <aside>
        <div class="brand">
            <div class="brand-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
            </div>
            DataMind Edge
        </div>

        <div class="upload-card" id="drop-zone">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 8px; color: var(--primary-accent);"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            <div style="font-size: 0.85rem; font-weight: 600;">Drop files here</div>
            <div style="font-size: 0.7rem; color: var(--text-muted);">PDF, CSV, Excel</div>
        </div>
        <input type="file" id="file-input" style="display:none" multiple>

        <div class="progress-bar" id="global-progress">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="status-text" style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; text-align: center;">Initializing...</div>

        <div class="file-list" id="files-container"></div>
        
        <button id="clear-workspace" style="width: 100%; padding: 10px; border: 1px solid var(--border); background: white; border-radius: 8px; font-size: 0.8rem; cursor: pointer; margin-top: 10px;">Clear Data</button>
    </aside>

    <main>
        <header>
            <div style="font-weight: 700; font-size: 0.85rem;">Local AI Session (Private)</div>
            <div class="status-badge">
                <div class="status-dot" id="online-dot"></div>
                <span id="engine-status">Offline</span>
            </div>
        </header>

        <div id="chat-container"></div>

        <div class="input-wrapper">
            <div class="input-container">
                <textarea id="query-input" rows="1" placeholder="Analyzing local data..." disabled></textarea>
                <button class="send-btn" id="send-btn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
