<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Data Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #1a1a1a;
            --primary: #2563eb;
            --border: #e5e7eb;
            --ai-msg: #f3f4f6;
            --user-msg: #2563eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        h1 { font-size: 1.2rem; margin: 0; font-weight: 600; }

        #chat-window {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 85%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--ai-msg);
            color: var(--text);
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg);
            color: white;
        }

        .input-container {
            border-top: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: center;
            background: white;
        }

        .input-group {
            max-width: 800px;
            width: 100%;
            display: flex;
            gap: 0.8rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        
        #upload-status {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>DataChat Minimal</h1>
        <div>
            <input type="file" id="fileInput" style="display: none;">
            <button onclick="document.getElementById('fileInput').click()">Upload File</button>
            <div id="upload-status">No file uploaded</div>
        </div>
    </header>

    <div id="chat-window">
        <!-- Messages appear here -->
        <div class="message ai">Upload a file (CSV, PDF, or Excel) to start chatting!</div>
    </div>

    <div class="input-container">
        <div class="input-group">
            <input type="text" id="queryInput" placeholder="Ask a question..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const fileInput = document.getElementById('fileInput');
        const queryInput = document.getElementById('queryInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('upload-status');

        function appendMessage(text, role) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerText = text;
            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        fileInput.onchange = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            statusEl.innerText = `Uploading ${file.name}...`;
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('http://localhost:8000/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.status === 'success') {
                    statusEl.innerText = `Ready: ${file.name}`;
                    appendMessage(`Successfully indexed: ${file.name}`, 'ai');
                } else {
                    statusEl.innerText = `Error: ${data.detail}`;
                }
            } catch (err) {
                statusEl.innerText = "Upload failed.";
                console.error(err);
            }
        };

        const handleSend = async () => {
            const question = queryInput.value.trim();
            if (!question) return;

            appendMessage(question, 'user');
            queryInput.value = '';

            try {
                const res = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();
                appendMessage(data.answer || "No response.", 'ai');
            } catch (err) {
                appendMessage("Error connecting to server.", 'ai');
                console.error(err);
            }
        };

        sendBtn.onclick = handleSend;
        queryInput.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
